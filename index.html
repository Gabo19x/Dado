<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>🎲 Dices</title>
  <!-- Enlaza el archivo CSS -->
  <link rel="stylesheet" href="css/style.css">

  <script type="module" src="./app.js"></script>
</head>
<body>
    <header>
      <h1>Dices for board games</h1>
      <p>Max 6</p>

      <section id="Botones">
        <div>
          <button class="BotonDado Gris" data-caras="2">D2</button>
          <button class="BotonDado Naranja" data-caras="4">D4</button>
          <button class="BotonDado Rojo" data-caras="6">D6</button>
          <button class="BotonDado Verde" data-caras="8">D8</button>
          <button class="BotonDado Azul" data-caras="10">D10</button>
          <button class="BotonDado Purpura" data-caras="12">D12</button>
          <button class="BotonDado VerdeOscuro" data-caras="20">D20</button>
          <button class="BotonDado Oro" data-caras="100">D100</button>
        </div>

        <div>
          <button class="Boton" id="TirarTodos">▶</button>
          <button class="Boton" id="Remover">❌</button>
        </div>
        
      </section>
    </header>

    <main>
        <section id="Dados"></section>
    </main>

    <footer>
      <p><small>Choose your preferred die, selected to play, or play them all at once.</small></p>
      <p>Development by: <a href="https://github.com/Gabo19x">Gabo19</a> for <a href="https://toog-inc.netlify.app/">TooG</a></p>
    </footer>
  
  
</body>
</html>
